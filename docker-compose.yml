services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - PUBLIC_API_URL=http://backend:8080
      - PUBLIC_API_URL_BROWSER=http://localhost:8080
      - PASSWORD=suvinsalasana
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
    command: npm run dev -- --host 0.0.0.0

  backend:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PASSWORD=suvinsalasana
    depends_on:
      - mongo
    volumes:
      - ./backend:/usr/src/backend

  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-data:/data/db
